<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em Html:5</title>
</head>
<body>
    <h1> Imagem Dinamicas</h1>
    <p>Tente abrir esse site em vários dispositivos diferentes ou simplesmente aumente e diminua o tamanho do seu navegador</p>


    <picture>
        <source media="(max-width: 750px)" srcset="Imagens/foto-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="Imagens/foto-m.png" type="image/png">
        <img src="Imagens/Sem título.png" alt="Imagem flexível">
    </picture>

    <h1>Reproduzindo audio</h1>
    <p>Vamos aprender a reproduzir áudio em HTML5</p>
    <!-- MP3 WAV OGG-->
     <audio preload="metadata" autoplay controls>
        <source src="midia/64sundays.mp3" type="audio/mpeg">
        <source src="midia/64sundays.ogg" type="audio/ogg">
        <source src="midia/64sundays.wav" type="audio/wav">
        Seu navegador não consegue reproduzir esse áudio. <a
        href="midia/64sundays.mp3">Clique aqui para baixar o arquivo de áudio</a>.
     </audio>

</body>
</html>
