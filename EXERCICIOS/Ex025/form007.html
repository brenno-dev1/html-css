<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Exemplo de Formulário</h1>
    <form action="cadastro.php" method="get" autocomplete="on">
        <p>
            <label for="iest">Estado</label>
            <select name="estado" id="iest"></select>

            <option value="" selected>---Escolha---</option>
            <optgroup label="REGIÃO SUDESTE">
                <option value="MG">Minas Gerais</option>
                <option value="RJ">Rio de Janeio</option>
                <option value="SP">São Paulo</option>
            </optgroup>

            <optgroup label="REGIÃO NORDESTE">
                <option >Maranhão</option>
                <option>Pernanbuco</option>
                <option>Rio Grande Do Norte</option>
            </optgroup>

        </p>
        <p>
            <label for="iprof">Profissão</label>
            <input type="text" name="prof" id="iprof" list="lstprof">
            <datalist id="lstprof">
                <option >Administrado</option>
                <option >Contabilista</option>
                <option >Desenvolvedor</option>
                <option >Professor</option>
            </datalist>
        </p>

        <p>
            <label for="msg">Mensagem :</label>
            <textarea name="msg" id="imsg" cols="30" rows="10"></textarea>
        </p>

        <p>
            <input type="submit" value="Enviar">
            <input type="reset"  value="Limpar">
        </p>
    </form>
</body>
</html>
