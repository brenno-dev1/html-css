<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas de Letras</title>
    <style>
    table {
    border-collapse: collapse;
    margin: 20px auto;
}

td {
    border: 1px solid black;
    padding: 10px;
    width: 60px;
}

.centro {
    text-align: center;
}

.espaco {
    padding: 30px;
}

.grande {
    width: 120px;
}
</style>
</head>
<body>
    <h2>Tabela de Letras</h2>
     <table>
        <tr>
            <td class="centro">A</td>
            <td>B</td>
            <td class="centro">C</td>
            <td>D</td>
            <td class="grande centro">E</td>
        </tr>
        <tr>
            <td class="espaço">F</td>
            <td>G</td>
            <td>H</td>
            <td class="espaço">I</td>
            <td class="centro">J</td>
        </tr>
    </table>

</body>
</html>
