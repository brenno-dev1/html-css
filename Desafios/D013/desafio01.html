<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Tabela</title>

<style>
table {
    border-collapse: collapse;
    margin: 50px auto;
}

td {
    border: 1px solid black;
    width: 60px;
    height: 60px;
    text-align: center;
    vertical-align: middle;
}

/* Classe especial para 2, 4 e 6 */
.largo {
    width: 150px;          /* largura maior */
    text-align: center;    /* garante centralização */
}
</style>

</head>
<body>

<table>
    <tr>
        <td>1</td>
        <td class="largo">2</td>
        <td>3</td>
    </tr>
    <tr>
        <td class="largo">4</td>
        <td>5</td>
        <td class="largo">6</td>
    </tr>
</table>

</body>
</html>
