<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela de Letras</title>
    <style>
        
    table {
    border-collapse: collapse;
    margin: 20px auto;
}

td {
    border: 1px solid black;
    padding: 10px;
    width: 60px;
}

.centro {
    text-align: center;
}

.espaco {
    padding: 30px;
}

.grande {
    width: 120px;
}
</style>
</head>
<body>
    <h2>Tabelas de Números</h2>
    <table>
           <tr>
            <td class="centro">1</td>
            <td>2</td>
            <td class="espaco">3</td>
            <td>4</td>
            <td>5</td>
        </tr>
         <tr>
            <td class="centro">6</td>
            <td>7</td>
            <td class="grande">8</td>
            <td>9</td>
            <td>10</td>
        </tr>
    </table>
</body>
</html>
